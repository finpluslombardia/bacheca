<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaBoard - Centro Federale Lampugnano</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .hidden { display: none !important; }
        
        /* Loading Spinner */
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #3498db;
            width: 24px;
            height: 24px;
            -webkit-animation: spin 1s linear infinite; /* Safari */
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <!-- HEADER -->
    <header class="bg-gradient-to-r from-cyan-600 to-blue-700 text-white shadow-lg sticky top-0 z-20">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            
            <!-- Logo e Titolo -->
            <div class="flex items-center gap-3 select-none">
                
                <!-- LOGO: Cerca 'CF Lampugnano trasp.png'. Fallback: Icona -->
                <img 
                    src="./CF Lampugnano trasp.png" 
                    alt="Logo Piscina" 
                    class="w-12 h-12 object-contain bg-white/90 rounded-full p-1 shadow-md"
                    onerror="this.style.display='none'; document.getElementById('fallbackIcon').classList.remove('hidden');"
                >
                
                <!-- ICONA DI FALLBACK -->
                <div id="fallbackIcon" class="hidden bg-white/20 p-2 rounded-full backdrop-blur-sm">
                    <i data-lucide="droplets" class="w-7 h-7 text-white"></i>
                </div>

                <div>
                    <h1 class="text-xl md:text-2xl font-bold tracking-tight">Centro Federale Lampugnano</h1>
                    <p class="text-cyan-100 text-xs md:text-sm">Bacheca Digitale Ufficiale</p>
                </div>
            </div>
            
            <!-- Cerca e Login -->
            <div class="flex items-center gap-3 w-full md:w-auto">
                <div class="relative w-full md:w-64">
                    <i data-lucide="search" class="absolute left-3 top-2.5 text-cyan-200 w-4 h-4"></i>
                    <input 
                        type="text" 
                        id="searchInput"
                        placeholder="Cerca avvisi..." 
                        class="w-full bg-white/10 border border-white/20 rounded-full py-2 pl-10 pr-4 text-white placeholder-cyan-200 focus:outline-none focus:bg-white/20 transition"
                        oninput="updateSearch(this.value)"
                    >
                </div>
                
                <!-- Bottone Login/Logout Admin -->
                <button 
                    onclick="toggleAdminAuth()"
                    id="authBtn"
                    class="p-2 rounded-full transition bg-white/10 hover:bg-white/20 text-white border border-transparent"
                    title="Accesso Staff"
                >
                    <i data-lucide="lock" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="max-w-6xl mx-auto px-4 py-8 flex-grow w-full">
        
        <!-- Controlli e Filtri -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
            <!-- Filtri -->
            <div class="flex flex-wrap gap-2" id="filterContainer">
                <!-- Bottoni generati via JS -->
            </div>

            <div class="flex items-center gap-3">
                <!-- Indicatore Loading -->
                <div id="loadingIndicator" class="hidden">
                    <div class="loader"></div>
                </div>

                <!-- Bottone Nuovo Avviso (Visibile solo se Admin) -->
                <button 
                    id="addNoticeBtn"
                    onclick="openModal()"
                    class="hidden flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white px-5 py-2.5 rounded-full shadow-md transition font-medium"
                >
                    <i data-lucide="plus" class="w-5 h-5"></i>
                    Nuovo Avviso
                </button>
            </div>
        </div>

        <!-- Griglia Avvisi -->
        <div id="noticesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Le card verranno inserite qui da JS -->
        </div>

        <!-- Stato Vuoto -->
        <div id="emptyState" class="hidden col-span-full py-12 flex flex-col items-center justify-center text-slate-400 bg-white rounded-xl border border-dashed border-slate-200 mt-6">
            <i data-lucide="megaphone" class="w-12 h-12 mb-4 opacity-20"></i>
            <p class="text-lg">Nessun avviso trovato.</p>
        </div>

    </main>
    
    <footer class="bg-slate-100 border-t border-slate-200 py-6 text-center text-slate-400 text-xs">
        <p>&copy; 2024 Centro Federale Lampugnano. Tutti i diritti riservati.</p>
    </footer>

    <!-- MODAL (Form di Aggiunta) -->
    <div id="noticeModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 backdrop-blur-sm fade-in">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h3 class="text-xl font-bold text-gray-800">Pubblica Nuovo Avviso</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <form onsubmit="handleFormSubmit(event)" class="p-6 space-y-4">
                <!-- Hidden ID for Editing mode (future proofing) -->
                <input type="hidden" id="editId">
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Titolo</label>
                    <input type="text" id="newTitle" required class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Es. Chiusura Vasca">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Categoria</label>
                    <select id="newCategory" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="info">Info</option>
                        <option value="urgent">Urgente</option>
                        <option value="event">Evento</option>
                        <option value="lost-found">Oggetti Smarriti</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Messaggio</label>
                    <textarea id="newContent" required rows="4" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none resize-none" placeholder="Dettagli dell'avviso..."></textarea>
                </div>
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="newPinned" class="w-4 h-4 text-blue-600 rounded focus:ring-blue-500">
                    <label for="newPinned" class="text-sm text-gray-700">Metti in evidenza (Pin in alto)</label>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition mt-2">
                    Pubblica Avviso
                </button>
            </form>
        </div>
    </div>

    <!-- FIREBASE & APP LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, updateDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- CONFIGURATION ---
        let firebaseConfig;
        let appId = 'cf-lampugnano-app'; // Nome univoco per i tuoi dati

        // >>> GESTIONE CONFIGURAZIONE <<<
        if (typeof __firebase_config !== 'undefined') {
            // Configurazione automatica per l'anteprima (Non toccare se sei qui)
            firebaseConfig = JSON.parse(__firebase_config);
            appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        } else {
            // === CONFIGURAZIONE UTENTE (BACHECA) ===
            firebaseConfig = {
              apiKey: "AIzaSyBVGUYgJhFnj20SED3-qpV5ksoBXBT7xCs",
              authDomain: "bacheca-5acac.firebaseapp.com",
              projectId: "bacheca-5acac",
              storageBucket: "bacheca-5acac.firebasestorage.app",
              messagingSenderId: "65310524220",
              appId: "1:65310524220:web:a7f8bd0cd97539f3325439"
            };
        }

        // --- INIT FIREBASE ---
        let app, auth, db;
        
        try {
            if(firebaseConfig) {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
            }
        } catch (e) {
            console.error("Errore inizializzazione Firebase:", e);
        }
        
        // Use a consistent collection path
        const NOTICES_COLLECTION = 'notices'; 

        // --- STATE ---
        let notices = [];
        let currentFilter = 'all';
        let currentSearch = '';
        let isAdminMode = false;
        
        // --- CONSTANTS ---
        const CATEGORIES = {
            all: { label: "Tutti", class: "bg-gray-100 text-gray-600" },
            urgent: { label: "Urgenti", class: "bg-red-100 text-red-700 border-red-200" },
            info: { label: "Info", class: "bg-blue-100 text-blue-700 border-blue-200" },
            event: { label: "Eventi", class: "bg-green-100 text-green-700 border-green-200" },
            "lost-found": { label: "Oggetti Smarriti", class: "bg-yellow-100 text-yellow-700 border-yellow-200" }
        };

        const ADMIN_PASSWORD = "piscina123";

        // --- INITIALIZATION ---
        
        // 1. Initialize Auth
        const initAuth = async () => {
             if (!auth) return;
             // Anon auth allows reading without explicit login page
             // Security rules in Firebase Console should be set to allow reads
             await signInAnonymously(auth).catch(console.error);
        };

        // 2. Start Logic
        initAuth();
        
        if (auth) {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    console.log("Connected to cloud storage as:", user.uid);
                    setupRealtimeListener();
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderFilters();
            lucide.createIcons();
            
            // Expose functions to window for HTML event handlers
            window.setFilter = setFilter;
            window.updateSearch = updateSearch;
            window.toggleAdminAuth = toggleAdminAuth;
            window.openModal = openModal;
            window.closeModal = closeModal;
            window.handleFormSubmit = handleFormSubmit;
            window.deleteNotice = deleteNotice;
            window.togglePin = togglePin;
        });

        // --- FIRESTORE LISTENERS ---
        function setupRealtimeListener() {
            if (!db) return;
            const loading = document.getElementById('loadingIndicator');
            loading.classList.remove('hidden');

            // Using standard collection path. 
            // Note: In production you might just use collection(db, 'notices') directly
            // but here we use the specific path to keep it compatible with the preview environment
            let q;
            if (typeof __firebase_config !== 'undefined') {
                q = collection(db, 'artifacts', appId, 'public', 'data', NOTICES_COLLECTION);
            } else {
                // Percorso standard per quando sei su GitHub (più pulito)
                q = collection(db, NOTICES_COLLECTION);
            }
            
            onSnapshot(q, (snapshot) => {
                notices = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));
                
                loading.classList.add('hidden');
                renderNotices();
            }, (error) => {
                console.error("Error fetching notices:", error);
                loading.classList.add('hidden');
                // Fallback for demo if DB fails
                if(notices.length === 0) {
                     document.getElementById('emptyState').querySelector('p').innerText = "Impossibile caricare gli avvisi (Errore Database)";
                     document.getElementById('emptyState').classList.remove('hidden');
                }
            });
        }

        // --- RENDER FUNCTIONS ---
        function renderFilters() {
            const container = document.getElementById('filterContainer');
            container.innerHTML = Object.keys(CATEGORIES).map(key => `
                <button 
                    onclick="setFilter('${key}')"
                    class="px-4 py-2 rounded-full text-sm font-medium transition-all ${
                        currentFilter === key 
                        ? 'bg-blue-600 text-white shadow-md transform scale-105' 
                        : 'bg-white text-slate-600 hover:bg-slate-100 border border-slate-200'
                    }"
                >
                    ${CATEGORIES[key].label}
                </button>
            `).join('');
        }

        function renderNotices() {
            const grid = document.getElementById('noticesGrid');
            const empty = document.getElementById('emptyState');

            // Filter logic
            let filtered = notices.filter(n => {
                const matchesFilter = currentFilter === 'all' || n.category === currentFilter;
                const matchesSearch = (n.title || '').toLowerCase().includes(currentSearch.toLowerCase()) || 
                                      (n.content || '').toLowerCase().includes(currentSearch.toLowerCase());
                return matchesFilter && matchesSearch;
            });

            // Sort logic (Pinned first, then by date descending)
            filtered.sort((a, b) => {
                if (a.isPinned === b.isPinned) {
                    // If dates exist, compare them
                    if (a.date && b.date) {
                        return new Date(b.date) - new Date(a.date);
                    }
                    return 0;
                }
                return a.isPinned ? -1 : 1;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                grid.innerHTML = filtered.map(n => `
                    <div class="bg-white rounded-xl shadow-sm border transition-all hover:shadow-md overflow-hidden flex flex-col fade-in ${n.isPinned ? 'border-l-4 border-l-blue-500 ring-1 ring-blue-100' : 'border-slate-100'}">
                        <div class="p-5 flex-1">
                            <div class="flex justify-between items-start mb-3">
                                <span class="px-2.5 py-0.5 rounded-md text-xs font-bold uppercase tracking-wide border ${CATEGORIES[n.category] ? CATEGORIES[n.category].class : 'bg-gray-100'}">
                                    ${CATEGORIES[n.category] ? CATEGORIES[n.category].label : 'Avviso'}
                                </span>
                                ${n.isPinned ? `<i data-lucide="pin" class="w-4 h-4 text-blue-500 fill-blue-500 transform rotate-45"></i>` : ''}
                            </div>
                            
                            <h3 class="text-lg font-bold text-slate-800 mb-2 leading-tight">${n.title}</h3>
                            <p class="text-slate-600 text-sm leading-relaxed mb-4 whitespace-pre-line">${n.content}</p>
                        </div>

                        <div class="px-5 py-4 bg-slate-50 border-t border-slate-100 flex justify-between items-center text-xs text-slate-500">
                            <div class="flex items-center gap-2">
                                <i data-lucide="calendar" class="w-3.5 h-3.5"></i>
                                <span>${n.date ? new Date(n.date).toLocaleDateString('it-IT') : 'Oggi'}</span>
                            </div>
                            
                            <div class="${isAdminMode ? 'flex' : 'hidden'} gap-2">
                                <button onclick="togglePin('${n.id}', ${n.isPinned})" class="p-1.5 rounded hover:bg-blue-100 ${n.isPinned ? 'text-blue-600' : 'text-slate-400'}" title="Evidenza">
                                    <i data-lucide="pin" class="w-4 h-4"></i>
                                </button>
                                <button onclick="deleteNotice('${n.id}')" class="p-1.5 rounded hover:bg-red-100 text-slate-400 hover:text-red-600 transition" title="Elimina">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
                
                lucide.createIcons();
            }
        }

        // --- INTERACTION ---
        function setFilter(filter) {
            currentFilter = filter;
            renderFilters();
            renderNotices();
        }

        function updateSearch(val) {
            currentSearch = val;
            renderNotices();
        }

        // --- AUTH & ADMIN ---
        function toggleAdminAuth() {
            if (isAdminMode) {
                // Logout
                isAdminMode = false;
                document.getElementById('addNoticeBtn').classList.add('hidden');
                
                // Reset button style
                const btn = document.getElementById('authBtn');
                btn.className = "p-2 rounded-full transition bg-white/10 hover:bg-white/20 text-white border border-transparent";
                btn.title = "Accesso Staff";
                btn.innerHTML = '<i data-lucide="lock" class="w-5 h-5"></i>';
                
                renderNotices();
                lucide.createIcons();
            } else {
                // Login Request
                const password = prompt("Inserisci password staff per modificare la bacheca:");
                if (password === ADMIN_PASSWORD) {
                    isAdminMode = true;
                    document.getElementById('addNoticeBtn').classList.remove('hidden');
                    
                    // Change button style to indicate active state
                    const btn = document.getElementById('authBtn');
                    btn.className = "p-2 rounded-full transition bg-white text-blue-700 shadow-md border border-white";
                    btn.title = "Esci (Logout)";
                    btn.innerHTML = '<i data-lucide="unlock" class="w-5 h-5"></i>';
                    
                    renderNotices();
                    lucide.createIcons();
                    alert("Benvenuto Staff CF Lampugnano! Ora puoi gestire gli avvisi.");
                } else if (password !== null) {
                    alert("Password errata.");
                }
            }
        }

        // --- CRUD OPERATIONS (FIRESTORE) ---
        async function handleFormSubmit(e) {
            e.preventDefault();
            if (!db) return alert("Database non connesso!");
            
            const title = document.getElementById('newTitle').value;
            const content = document.getElementById('newContent').value;
            const category = document.getElementById('newCategory').value;
            const isPinned = document.getElementById('newPinned').checked;
            
            try {
                // Usa la stessa logica di percorso del listener
                let collectionRef;
                if (typeof __firebase_config !== 'undefined') {
                    collectionRef = collection(db, 'artifacts', appId, 'public', 'data', NOTICES_COLLECTION);
                } else {
                    collectionRef = collection(db, NOTICES_COLLECTION);
                }

                await addDoc(collectionRef, {
                    title,
                    content,
                    category,
                    isPinned,
                    date: new Date().toISOString().split('T')[0],
                    timestamp: Date.now()
                });
                
                closeModal();
            } catch (err) {
                console.error("Error adding notice:", err);
                alert("Errore durante il salvataggio. Riprova.");
            }
        }

        async function deleteNotice(id) {
            if(confirm("Sei sicuro di voler eliminare definitivamente questo avviso?")) {
                try {
                    let docRef;
                    if (typeof __firebase_config !== 'undefined') {
                        docRef = doc(db, 'artifacts', appId, 'public', 'data', NOTICES_COLLECTION, id);
                    } else {
                        docRef = doc(db, NOTICES_COLLECTION, id);
                    }
                    await deleteDoc(docRef);
                } catch (err) {
                    console.error("Error deleting:", err);
                    alert("Errore nell'eliminazione.");
                }
            }
        }

        async function togglePin(id, currentStatus) {
            try {
                let docRef;
                if (typeof __firebase_config !== 'undefined') {
                    docRef = doc(db, 'artifacts', appId, 'public', 'data', NOTICES_COLLECTION, id);
                } else {
                    docRef = doc(db, NOTICES_COLLECTION, id);
                }
                await updateDoc(docRef, {
                    isPinned: !currentStatus
                });
            } catch (err) {
                console.error("Error toggling pin:", err);
            }
        }

        // --- MODAL HELPERS ---
        function openModal() {
            document.getElementById('noticeModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('noticeModal').classList.add('hidden');
            // Reset form
            document.getElementById('newTitle').value = '';
            document.getElementById('newContent').value = '';
            document.getElementById('newCategory').value = 'info';
            document.getElementById('newPinned').checked = false;
        }

    </script>
</body>
</html>
